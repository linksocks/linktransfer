version: "3.8"

services:
  linktransfer-relay:
    build: .
    command: ["relay", "--host", "0.0.0.0", "--port", "9009", "--transfers", "5"]
    ports:
      - "9009:9009"
      - "9010:9010"
      - "9011:9011"
      - "9012:9012"
      - "9013:9013"
    restart: unless-stopped

  linktransfer-tunnel:
    build: .
    command: ["tunnel", "server", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    restart: unless-stopped
